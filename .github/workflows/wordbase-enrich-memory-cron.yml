name: Wordbase enrich memory (hourly)

on:
  schedule:
    # Every hour at minute 0 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: wordbase-enrich-memory
  cancel-in-progress: false

jobs:
  enrich-memory:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/wordbase_import/requirements.txt

      - name: Install Python dependencies
        run: |
          python3 -m venv scripts/wordbase_import/.venv
          scripts/wordbase_import/.venv/bin/pip install -r scripts/wordbase_import/requirements.txt

      - name: Run wordbase memory enrich
        env:
          ALLOW_PRODUCTION_BULK_API: "1"
          APP_API_BASE_URL: https://learn.lexiland.cc
          WORDBASE_ENRICH_LIMIT: ${{ vars.WORDBASE_ENRICH_LIMIT }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          IMPORT_USER_EMAIL: ${{ secrets.IMPORT_USER_EMAIL }}
          IMPORT_USER_PASSWORD: ${{ secrets.IMPORT_USER_PASSWORD }}
        run: npm run wordbase:enrich-memory:cron
